{% extends "web/base.html" %}
{% block title %}Sign in · ideagraph{% endblock %}
{% block content %}
  <section class="panel panel-narrow">
    <h1>Sign in</h1>
    {% if form.errors %}
      <p class="app-message error">Incorrect username or password.</p>
    {% endif %}
    <form method="post" action="{% url 'login' %}" class="form">
      {% csrf_token %}
      <label>Username<br />{{ form.username }}</label>
      <label>Password<br />{{ form.password }}</label>
      <input type="hidden" name="next" value="{{ next }}" />
      <button type="submit">Sign in</button>
    </form>
  </section>
{% endblock %}
